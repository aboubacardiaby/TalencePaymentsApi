name: Build and Deploy to Cloud Run

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: false
        default: production
        type: choice
        options: [production, staging]

env:
  SERVICE_NAME: talence-payments-api

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t talence-payments-api:${{ github.sha }} .

  deploy:
    name: Push and Deploy
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')) || github.event_name == 'workflow_dispatch'

    env:
      REGION: ${{ vars.GCP_REGION }}
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug variables
        run: |
          echo "GCP_REGION from vars: '${{ vars.GCP_REGION }}'"
          echo "GCP_PROJECT_ID from vars: '${{ vars.GCP_PROJECT_ID }}'"
          echo "REGION from env: '${{ env.REGION }}'"
          echo "PROJECT_ID from env: '${{ env.PROJECT_ID }}'"

      - name: Validate required variables
        run: |
          if [ -z "${{ vars.GCP_REGION }}" ]; then
            echo "::error::GCP_REGION variable is not set"
            exit 1
          fi
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "::error::GCP_PROJECT_ID variable is not set"
            exit 1
          fi

      - name: Authenticate to GCP via Workload Identity
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        run: |
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/talence-payments-api/talence-payments-api"
          docker build \
            -t $IMAGE:${{ github.sha }} \
            -t $IMAGE:latest \
            .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/talence-payments-api/talence-payments-api:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --port=8080
            --timeout=300
          env_vars: |
            STRIPE__SECRETKEY=${{ secrets.STRIPE_SECRET_KEY }}
            STRIPE__WEBHOOKSECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
